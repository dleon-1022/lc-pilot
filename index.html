<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC Review — Piloto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;user-select:none}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:360px}
.login-logo{font-size:28px;text-align:center;margin-bottom:6px}
.login-title{font-size:18px;font-weight:700;text-align:center;color:#f1f5f9;margin-bottom:4px}
.login-sub{font-size:12px;color:#64748b;text-align:center;margin-bottom:28px}
.login-label{display:block;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.login-input{width:100%;padding:10px 13px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#f1f5f9;font-size:14px;outline:none}
.login-input:focus{border-color:#6366f1}
.login-field{margin-bottom:14px}
.login-btn{width:100%;margin-top:8px;padding:11px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.login-btn:hover{background:#4f46e5}
.login-error{margin-top:10px;color:#f87171;font-size:12px;text-align:center;min-height:16px}

/* ── APP ── */
.app{display:none;flex-direction:column;min-height:100vh}
.app.visible{display:flex}

/* ── HEADER ── */
.header{background:#1e293b;border-bottom:1px solid #334155;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header-title{font-size:15px;font-weight:700;color:#f1f5f9;flex:1}
.tab-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #334155;background:transparent;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:#6366f1;border-color:#6366f1;color:#fff}
.tab-btn:hover:not(.active){border-color:#6366f1;color:#6366f1}
.header-right{display:flex;align-items:center;gap:8px}
.user-chip{font-size:11px;color:#94a3b8;background:#0f172a;border:1px solid #334155;padding:4px 10px;border-radius:20px}
.logout-btn{padding:5px 10px;border:1px solid #334155;border-radius:6px;background:transparent;color:#64748b;font-size:11px;cursor:pointer}
.logout-btn:hover{color:#f1f5f9;border-color:#64748b}

/* ── PROGRESS ── */
.progress-bar-wrap{background:#1e293b;border-bottom:1px solid #334155;padding:10px 20px;display:flex;align-items:center;gap:14px}
.progress-track{flex:1;height:5px;background:#334155;border-radius:3px}
.progress-fill{height:100%;background:#6366f1;border-radius:3px;transition:width .3s}
.progress-text{font-size:11px;color:#64748b;white-space:nowrap}
.shortcuts-hint{font-size:10px;color:#475569;margin-left:auto;white-space:nowrap}

/* ── MAIN CONTENT ── */
.review-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.review-card{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden;width:100%;max-width:800px}

/* ── IMAGE REVIEW ── */
.img-container{background:#000;display:flex;align-items:center;justify-content:center;min-height:360px;cursor:pointer;position:relative}
.img-container img{max-width:100%;max-height:480px;object-fit:contain;display:block}
.img-fullscreen-hint{position:absolute;bottom:8px;right:10px;font-size:10px;color:rgba(255,255,255,.35)}

/* ── VIDEO REVIEW ── */
.video-container{background:#000;display:flex;align-items:center;justify-content:center;min-height:360px}
.video-container video{max-width:100%;max-height:480px;display:block}

/* ── CARD INFO ── */
.card-info{padding:14px 18px;border-top:1px solid #334155;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.info-pill{font-size:11px;color:#94a3b8;background:#0f172a;border:1px solid #334155;padding:3px 10px;border-radius:20px}
.info-time{font-size:11px;color:#6366f1;font-weight:600}
.card-nav{margin-left:auto;display:flex;gap:6px}
.nav-btn{padding:5px 12px;border:1px solid #334155;border-radius:6px;background:transparent;color:#64748b;font-size:11px;cursor:pointer}
.nav-btn:hover{color:#f1f5f9;border-color:#64748b}

/* ── VERDICT BUTTONS ── */
.verdict-bar{padding:16px 18px;border-top:1px solid #334155;display:flex;gap:12px;justify-content:center}
.verdict-btn{flex:1;max-width:200px;padding:12px 0;border-radius:10px;border:2px solid transparent;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.verdict-btn .key{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-size:11px;font-weight:800;background:rgba(0,0,0,.25)}
.btn-pass{background:#064e3b;border-color:#059669;color:#6ee7b7}
.btn-pass:hover,.btn-pass.active{background:#059669;border-color:#059669;color:#fff}
.btn-fail{background:#450a0a;border-color:#dc2626;color:#fca5a5}
.btn-fail:hover,.btn-fail.active{background:#dc2626;border-color:#dc2626;color:#fff}
.verdict-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── DONE STATE ── */
.done-overlay{position:relative}
.done-badge{position:absolute;top:12px;left:12px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.done-pass{background:#059669;color:#fff}
.done-fail{background:#dc2626;color:#fff}

/* ── INCIDENT PANEL ── */
.incident-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:center;justify-content:center}
.incident-backdrop.open{display:flex}
.incident-panel{background:#1e293b;border:1px solid #334155;border-radius:14px;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.incident-header{padding:16px 18px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
.incident-header h3{font-size:14px;font-weight:700;color:#f1f5f9}
.incident-hint{font-size:10px;color:#64748b}
.incident-list{flex:1;overflow-y:auto;padding:8px}
.incident-item{padding:10px 14px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;margin-bottom:4px;transition:all .1s}
.incident-item:hover{background:#0f172a;border-color:#334155}
.incident-item.focused{background:#1d2d50;border-color:#6366f1}
.incident-item .inc-category{font-size:9px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.incident-item .inc-name{font-size:13px;color:#e2e8f0}
.incident-skip{padding:12px;border-top:1px solid #334155}
.incident-skip-btn{width:100%;padding:9px;border:1.5px solid #334155;border-radius:8px;background:transparent;color:#64748b;font-size:12px;cursor:pointer}
.incident-skip-btn:hover{color:#f1f5f9;border-color:#64748b}

/* ── EMPTY / DONE STATES ── */
.empty-state{text-align:center;padding:60px 20px;color:#64748b}
.empty-state h2{font-size:18px;margin-bottom:8px;color:#94a3b8}
.empty-state p{font-size:13px}

/* ── SAVE STATUS ── */
.save-toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;transition:opacity .3s;opacity:0}
.save-toast.show{opacity:1}
.save-toast.ok{background:#059669;color:#fff}
.save-toast.err{background:#dc2626;color:#fff}
.save-toast.saving{background:#6366f1;color:#fff}

/* ── SNAPSHOT CANVAS (oculto) ── */
#snapshotCanvas{display:none}
</style>
</head>

<!-- ════════════════════════════════ LOGIN ════════════════════════════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🎬</div>
    <div class="login-title">LC Review</div>

    </div>
    <button class="login-btn" id="loginBtn">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ════════════════════════════════ APP ════════════════════════════════ -->
<div class="app" id="app">

  <!-- Review Area -->

</div><!-- /app -->

<!-- Incident Panel -->
<div class="incident-backdrop" id="incidentBackdrop">

    <div class="incident-skip">
      <button class="incident-skip-btn" id="incidentSkipBtn">Sin incidente específico (Enter vacío)</button>
    </div>
  </div>
</div>

<!-- Save Toast -->
<div class="save-toast" id="saveToast"></div>

<canvas id="snapshotCanvas"></canvas>

// ══════════════════════════════════════════════════════════════
// SHA-256 (Web Crypto API)
// ══════════════════════════════════════════════════════════════
async function sha256hex(str) {
  const buf  = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

let currentUser   = null;
let currentAudit  = "limpieza_assembly";
let currentIndex  = 0;
let incidentFocus = 0;
let pendingVerdict = null;   // "pass" | "fail"
let itemsByAudit  = {};

function initItems() {
  itemsByAudit = {};
  for (const item of ALL_ITEMS) {
    if (!itemsByAudit[item.audit_type]) itemsByAudit[item.audit_type] = [];
    itemsByAudit[item.audit_type].push(item);
  }
}

function currentItems() {
  return itemsByAudit[currentAudit] || [];
}

function currentItem() {
  return currentItems()[currentIndex] || null;
}

function savedKey(itemId) {
  return "lc_review_" + itemId;
}

function loadProgress() {
  for (const item of ALL_ITEMS) {
    const saved = localStorage.getItem(savedKey(item.id));
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        Object.assign(item, parsed);
      } catch(_) {}
    }
  }
}

function saveItemLocal(item) {
  localStorage.setItem(savedKey(item.id), JSON.stringify({
    result: item.result,
    incident_id: item.incident_id,
    reviewer: item.reviewer,
    reviewed_at: item.reviewed_at,
    snapshot_path: item.snapshot_path || null,
  }));
}

document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("loginPass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
document.getElementById("loginUser").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("loginPass").focus();
});

async function doLogin() {
  const user = document.getElementById("loginUser").value.trim().toLowerCase();
  const pass = document.getElementById("loginPass").value;
  const err  = document.getElementById("loginError");

  if (!USERS[user]) { err.textContent = "Usuario no encontrado"; return; }

  const hash = await sha256hex(pass);
  if (hash !== USERS[user].hash) { err.textContent = "Contraseña incorrecta"; return; }

  currentUser = user;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").classList.add("visible");
  document.getElementById("userChip").textContent = USERS[user].label;

  initItems();
  loadProgress();
  switchAudit("limpieza_assembly");
  document.addEventListener("keydown", onKeyDown);
}

document.getElementById("logoutBtn").addEventListener("click", () => {
  currentUser = null;
  document.getElementById("app").classList.remove("visible");
  document.getElementById("loginScreen").style.display = "";
  document.getElementById("loginUser").value = "";
  document.getElementById("loginPass").value = "";
  document.removeEventListener("keydown", onKeyDown);
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => switchAudit(btn.dataset.audit));
});

function switchAudit(key) {
  currentAudit = key;
  currentIndex = 0;
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.audit === key);
  });
  // Avanzar al primer item no revisado
  const items = currentItems();
  const firstPending = items.findIndex(i => !i.result);
  if (firstPending >= 0) currentIndex = firstPending;
  renderCurrent();
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function renderCurrent() {
  const items = currentItems();
  const item  = currentItem();

  // Progress
  const done  = items.filter(i => i.result).length;
  const pct   = items.length ? (done / items.length * 100).toFixed(1) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${done} / ${items.length}`;

  const area = document.getElementById("reviewArea");

  if (!item) {
    area.innerHTML = `<div class="empty-state">
      <h2>✅ Todo revisado</h2>
      <p>${done} muestras completadas</p>
      <br><button onclick="pushResults()" style="margin-top:16px;padding:10px 24px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Guardar en GitHub</button>
    </div>`;
    return;
  }

  const isVideo = item.audit_type === "sheetout";
  const isDone  = !!item.result;

  let mediaHtml = "";
  if (isVideo) {
    mediaHtml = `
      <div class="video-container">
        <video id="reviewVideo" controls src="${item.video_url}" style="width:100%;max-height:480px">
          Tu navegador no soporta video.
        </video>
      </div>`;
  } else {
    mediaHtml = `
      <div class="img-container" onclick="openFullscreen(this)">
        <img id="reviewImg" src="${item.frame_path}" alt="Frame" loading="lazy"
             onerror="this.src='';this.parentElement.innerHTML='<div style=\'color:#64748b;padding:40px\'>No se pudo cargar la imagen</div>'">
        <span class="img-fullscreen-hint">clic para ampliar</span>
      </div>`;
  }

  const passLabel = isVideo ? "Pasa" : "Correcto";
  const failLabel = isVideo ? "Falla" : "Incorrecto";

  const hourLabel = item.target_hour != null
    ? `${item.target_hour.toString().padStart(2,"0")}:${item.target_minute.toString().padStart(2,"0")}`
    : "";

  const incidentName = item.incident_id
    ? ((INCIDENTS[item.audit_type] || []).find(i => i.id === item.incident_id) || {}).name || ""
    : "";

  let doneBadge = "";
  if (isDone) {
    const cls  = item.result === "pass" ? "done-pass" : "done-fail";
    const lbl  = item.result === "pass" ? (isVideo ? "✓ PASA" : "✓ CORRECTO") : (isVideo ? "✗ FALLA" : "✗ INCORRECTO");
    const inc  = incidentName ? ` · ${incidentName}` : "";
    doneBadge  = `<div class="done-badge ${cls}">${lbl}${inc}</div>`;
  }

  area.innerHTML = `
    <div class="review-card">
      <div style="position:relative" class="${isDone ? "done-overlay" : ""}">
        ${mediaHtml}
        ${doneBadge}
      </div>
      <div class="card-info">
        <span class="info-pill">📍 ${item.location_name}</span>
        <span class="info-pill">📅 ${item.date}</span>
        ${hourLabel ? `<span class="info-time">🕐 ${hourLabel}</span>` : ""}
        <div class="card-nav">
          <button class="nav-btn" onclick="navigate(-1)">← Anterior</button>
          <span style="font-size:11px;color:#475569;padding:5px 8px">${currentIndex+1}/${items.length}</span>
          <button class="nav-btn" onclick="navigate(1)">Siguiente →</button>
        </div>
      </div>
      <div class="verdict-bar">
        <button class="verdict-btn btn-pass ${item.result==='pass'?'active':''}" id="btnPass" onclick="verdict('pass')">
          <span class="key">A</span> ${passLabel}
        </button>
        <button class="verdict-btn btn-fail ${item.result==='fail'?'active':''}" id="btnFail" onclick="verdict('fail')">
          <span class="key">S</span> ${failLabel}
        </button>
      </div>
    </div>`;
}

function openFullscreen(el) {
  const img = el.querySelector("img");
  if (!img) return;
  window.open(img.src, "_blank");
}

// ══════════════════════════════════════════════════════════════
// VEREDICTO
// ══════════════════════════════════════════════════════════════
function navigate(dir) {
  const len = currentItems().length;
  currentIndex = Math.max(0, Math.min(len - 1, currentIndex + dir));
  renderCurrent();
}

async function verdict(result) {
  const item = currentItem();
  if (!item) return;

  pendingVerdict = result;

  if (result === "fail") {
    openIncidentPanel(item.audit_type);
  } else {
    await applyVerdict(item, result, null);
  }
}

async function applyVerdict(item, result, incidentId) {
  // Snapshot automático para Sheetout
  if (item.audit_type === "sheetout") {
    const snapshotPath = await captureSnapshot(item);
    item.snapshot_path = snapshotPath;
  }

  item.result      = result;
  item.incident_id = incidentId || null;
  item.reviewer    = currentUser;
  item.reviewed_at = new Date().toISOString();

  saveItemLocal(item);
  renderCurrent();

  // Auto-avanzar al siguiente pendiente
  setTimeout(() => {
    const items   = currentItems();
    const nextIdx = items.findIndex((it, idx) => idx > currentIndex && !it.result);
    if (nextIdx >= 0) {
      currentIndex = nextIdx;
      renderCurrent();
    }
  }, 350);
}

// ══════════════════════════════════════════════════════════════
// SNAPSHOT (video → canvas → base64 → GitHub)
// ══════════════════════════════════════════════════════════════
async function captureSnapshot(item) {
  try {
    const video  = document.getElementById("reviewVideo");
    if (!video) return null;
    const canvas = document.getElementById("snapshotCanvas");
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 360;
    canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl  = canvas.toDataURL("image/jpeg", 0.85);
    const base64   = dataUrl.split(",")[1];
    const filename = `${GH_SNAPSHOTS}snapshot_${item.id}.jpg`;
    await githubPutFile(filename, base64, `Snapshot: ${item.id}`);
    return filename;
  } catch (e) {
    console.warn("Snapshot falló:", e);
    return null;
  }
}

function openIncidentPanel(auditKey) {
  const incidents = INCIDENTS[auditKey] || [];
  incidentFocus   = 0;

  const list = document.getElementById("incidentList");
  list.innerHTML = incidents.map((inc, i) => `
    <div class="incident-item ${i===0?'focused':''}" data-idx="${i}" data-id="${inc.id}"
         onclick="selectIncident(${inc.id})">
      <div class="inc-category">${inc.category || "General"}</div>
      <div class="inc-name">${inc.name}</div>
    </div>`).join("");

  document.getElementById("incidentBackdrop").classList.add("open");
}

function closeIncidentPanel() {
  document.getElementById("incidentBackdrop").classList.remove("open");
  pendingVerdict = null;
}

async function selectIncident(incidentId) {
  closeIncidentPanel();
  const item = currentItem();
  if (!item) return;
  await applyVerdict(item, "fail", incidentId);
}

document.getElementById("incidentSkipBtn").addEventListener("click", async () => {
  closeIncidentPanel();
  const item = currentItem();
  if (!item) return;
  await applyVerdict(item, "fail", null);
});

function updateIncidentFocus() {
  document.querySelectorAll(".incident-item").forEach((el, i) => {
    el.classList.toggle("focused", i === incidentFocus);
  });
  const focused = document.querySelector(".incident-item.focused");
  if (focused) focused.scrollIntoView({block:"nearest"});
}

// ══════════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════════
function onKeyDown(e) {
  const panelOpen = document.getElementById("incidentBackdrop").classList.contains("open");

  if (panelOpen) {
    const incidents = INCIDENTS[currentAudit] || [];
    if (e.key === "ArrowDown") {
      e.preventDefault();
      incidentFocus = Math.min(incidentFocus + 1, incidents.length - 1);
      updateIncidentFocus();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      incidentFocus = Math.max(incidentFocus - 1, 0);
      updateIncidentFocus();
    } else if (e.key === "Enter") {
      e.preventDefault();
      const inc = incidents[incidentFocus];
      if (inc) selectIncident(inc.id);
      else selectIncident(null);
    } else if (e.key === "Escape") {
      closeIncidentPanel();
    }
    return;
  }

  // Sin panel abierto
  if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON") return;

  if (e.key === "a" || e.key === "A") {
    e.preventDefault();
    verdict("pass");
  } else if (e.key === "s" || e.key === "S") {
    e.preventDefault();
    verdict("fail");
  } else if (e.key === "ArrowRight") {
    e.preventDefault();
    navigate(1);
  } else if (e.key === "ArrowLeft") {
    e.preventDefault();
    navigate(-1);
  }
}

// ══════════════════════════════════════════════════════════════
// GITHUB API
// ══════════════════════════════════════════════════════════════
async function githubPutFile(path, base64Content, commitMsg) {
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;

  // Obtener SHA si el archivo ya existe (para actualizarlo)
  let sha = null;
  try {
    const check = await fetch(url, {
      headers: {
        Authorization: `token ${GH_TOKEN}`,
        Accept: "application/vnd.github.v3+json",
      },
    });
    if (check.ok) {
      const data = await check.json();
      sha = data.sha;
    }
  } catch (_) {}

  const body = {
    message: commitMsg,
    content: base64Content,
    branch: GH_BRANCH,
  };
  if (sha) body.sha = sha;

  const res = await fetch(url, {
    method: "PUT",
    headers: {
      Authorization: `token ${GH_TOKEN}`,
      Accept: "application/vnd.github.v3+json",
      "Content-Type": "application/json",
    },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`GitHub API ${res.status}: ${err}`);
  }
  return res.json();
}

async function pushResults() {
  const toast = document.getElementById("saveToast");
  toast.className = "save-toast saving show";
  toast.textContent = "Guardando en GitHub...";

  try {
    const today = new Date().toISOString().slice(0,10);
    const items = currentItems().filter(i => i.result);

    if (!items.length) {
      toast.className = "save-toast err show";
      toast.textContent = "Sin resultados para guardar";
      setTimeout(() => toast.classList.remove("show"), 3000);
      return;
    }

    const filename = `${GH_RESULTS}verdicts_${today}_${currentAudit}_${currentUser}.json`;
    const payload  = {
      saved_at: new Date().toISOString(),
      audit_type: currentAudit,
      reviewer: currentUser,
      reviewer_label: USERS[currentUser]?.label,
      total: items.length,
      items,
    };

    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    await githubPutFile(filename, b64, `Resultados ${currentAudit} por ${currentUser} ${today}`);

    toast.className = "save-toast ok show";
    toast.textContent = `✓ ${items.length} resultados guardados`;
  } catch (e) {
    console.error(e);
    toast.className = "save-toast err show";
    toast.textContent = "Error al guardar: " + e.message;
  }

  setTimeout(() => toast.classList.remove("show"), 4000);
}

// Auto-guardar cada 5 minutos
setInterval(() => {
  const items = currentItems().filter(i => i.result);
  if (items.length && currentUser) pushResults();
}, 5 * 60 * 1000);
</script>
